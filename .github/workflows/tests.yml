name: run-tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    tests:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: true
            matrix:
                os: [ ubuntu-latest ]
                php: [ 8.5, 8.4, 8.3]
                laravel: [ "^13.0", "^12.0", "^11.0" ]
                stability: [ prefer-stable ]
                include:
                    - { php: '8.3', testbench: '^9.0',  laravel: '11' }
                    - { php: '8.3', testbench: '^10.0', laravel: '12' }
                    - { php: '8.3', testbench: '^11.0', laravel: '13' }
                    - { php: '8.4', testbench: '^9.0',  laravel: '11' }
                    - { php: '8.4', testbench: '^10.0', laravel: '12' }
                    - { php: '8.4', testbench: '^11.0', laravel: '13' }
                    - { php: '8.5', testbench: '^9.0',  laravel: '11' }
                    - { php: '8.5', testbench: '^10.0', laravel: '12' }
                    - { php: '8.5', testbench: '^11.0', laravel: '13' }

        name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    coverage: none

            -   name: Setup problem matchers
                run: |
                    echo "::add-matcher::${{ runner.tool_cache }}/php.json"
                    echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

            -   name: Install dependencies
                run: |
                    composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
                    composer update --${{ matrix.stability }} --prefer-dist --no-interaction

            -   name: Execute tests
                run: vendor/bin/pest
