name: run-tests

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    tests:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                include:
                    - { php: '8.3', testbench: '^9.0',  laravel: '^11.0' }
                    - { php: '8.3', testbench: '^10.0', laravel: '^12.0' }
                    - { php: '8.3', testbench: '^11.0', laravel: '^13.0' }
                    - { php: '8.4', testbench: '^9.0',  laravel: '^11.0' }
                    - { php: '8.4', testbench: '^10.0', laravel: '^12.0' }
                    - { php: '8.4', testbench: '^11.0', laravel: '^13.0' }
                    - { php: '8.5', testbench: '^9.0',  laravel: '^11.0' }
                    - { php: '8.5', testbench: '^10.0', laravel: '^12.0' }
                    - { php: '8.5', testbench: '^11.0', laravel: '^13.0' }

        name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    coverage: none

            -   name: Setup problem matchers
                run: |
                    echo "::add-matcher::${{ runner.tool_cache }}/php.json"
                    echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

            -   name: Install dependencies
                run: |
                    composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
                    composer require "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
                    composer update --prefer-source --prefer-dist --no-interaction

            -   name: Execute tests
                run: vendor/bin/pest
